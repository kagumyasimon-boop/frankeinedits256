<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Frank Einz Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        /* Matching your existing glass-panel aesthetic */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white min-h-screen flex items-center justify-center p-6">

    <div class="absolute -top-24 -right-24 w-64 h-64 bg-[#D4AF37]/10 rounded-full blur-[80px]"></div>

    <div class="max-w-md w-full glass-panel p-10 rounded-xl text-center relative z-10">
        <div class="mb-6 inline-flex items-center justify-center w-20 h-20 rounded-full bg-[#D4AF37]/20">
            <span class="material-symbols-outlined text-[#D4AF37] text-4xl">check_circle</span>
        </div>

        <h1 class="text-3xl font-bold mb-4 tracking-tight">Message Received</h1>
        <p class="text-gray-400 mb-8 leading-relaxed">
            Thank you for reaching out! Your project brief has been sent to my inbox. I typically respond to all inquiries within 1 - 4 hours.
        </p>

        <a href="index.html" class="inline-block w-full py-4 bg-[#D4AF37] text-black font-bold uppercase tracking-[0.2em] hover:bg-white transition-all duration-500 rounded-sm">
            Return Home
        </a>
        
        <p class="mt-8 text-xs text-gray-600 uppercase tracking-widest">Frank Einz Media © 2026</p>
    </div>

</body>
</html>
